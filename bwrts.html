<script>

  document.getElementById('page_header').innerHTML =
'<div class="table">'+
  '<div class="tcell vmid"><h1 id="pheader">'+'Список авторов в алфавитном порядке'+'</h1></div>'+
  '<div class="tcell tright nopad vmid" style="width:100px">'+addFinder("books")+'</div>'+
'</div>';
  document.getElementById('page_content').innerHTML = addLoader(1);

  function addWrtHead(){
    var tmpl =
  '<table width="100%" class="small" style="padding:0 5px"><tr>'+
    '<td align="right">'+
      '<a class="gray" href="?'+urlBuild({sort:1, dir: (urlParams().dir == 1 ? 'null' : 1)})+'">'+'Имя'+'</a> &emsp; '+
      '<a class="gray" href="?'+urlBuild({sort:2, dir: (urlParams().dir == 1 ? 'null' : 1)})+'">'+'Кол'+'</a> &emsp; '+
      '<a class="gray" href="?'+urlBuild({sort:3, dir: (urlParams().dir == 1 ? 'null' : 1)})+'">'+'Время'+'</a>'+
    '</td>'+
  '</tr></table>';
    return tmpl;
  }

  function addWrt(wrt,i){
    var subdir = '';
    if (ROOTS[wrt[3]][0] != '.'){
      subdir = '<em class="smaller"> / '+ROOTS[wrt[3]][0]+ '</em> ';
    }
    var tmpl = 
  '<div class="msgtext">'+
    '<table class="av" width="100%"><tr>'+
      // '<td width="5%" class="hspaced"><div id="im'+i+'"></div></td>'+
      '<td width="80%" class="hspaced"><a class="nodecor dark" href="books.html?'+tr(wrt[0])+'">'+wrt[0]+subdir+'</a></td>'+
      '<td width="8%" align="right"><b><i>'+wrt[1]+'</i></b></td>'+
      '<td width="8%" align="right"><i class="light small">'+i+'</i></td>'+
      '<td align="right" class="tooltip gray smaller" title="обновлено '+buildDate(wrt[2])+'" onclick="this.innerHTML=addIClock()+this.title"> '+addIClock()+' </td>'+
    '</tr></table>'+
  '</div>';
    // var img = new Image();
    // img.className = "rounded";
    // img.src = 'books/img/'+tr(wrt[0])+'.jpg';
    // img.onload = function(){ document.getElementById('im'+i).appendChild(this); };
    return tmpl;
  }

  function addPageContent(page, iinit){
    PAGE.lock = 1;
    if(!page.wrts.length){
      document.getElementById('page_content').innerHTML += addNotFound();
      return 1;
    }
    if(window.addYaRTB_Block && iinit) {
      document.querySelector('.mh_hd').innerHTML = '<div id="ya_rtb_hd" '+(window.innerWidth<1350 ? 'style="min-height:130px"' : '')+ '></div>';
      addYaRTB_Block('ya_rtb_hd', YA_RTB['books']);
    }
    page.bottom = (page.num)*page.per;
    page.top = page.bottom+page.per;
    page.m_wrts = page.wrts.slice(page.bottom, page.top);
    if(page.m_wrts.length){
      document.getElementById('page_footer').innerHTML = addPaginator(page.wrts, page,
    '<button onclick="this.disabled = addPageContent(PAGE)" class="rounded nopad hmarg bigger" title="Загрузить ещё">&#8634;</button>');
    }
    if(iinit){
      document.getElementById('page_content').innerHTML += addWrtHead();
    }
    for(var i=0; i<page.m_wrts.length; i++){
      document.getElementById('page_content').innerHTML +=
    '<div id="wrt'+(i+page.bottom)+'" class="wrap" style="padding:5px 10px">'+addWrt(page.m_wrts[i], page.bottom+i+1)+'</div>';
    }
    page.num++;
    setTimeout(function(){ PAGE.lock = (page.m_wrts.length == 0 || page.num%10 == 0 || urlParams().page); });
    return (page.m_wrts.length == 0);
  }

  xhr({url: 'books/index.js?'+(+new Date())}, function(s){
    eval(s);
    window.PAGE = {};
    PAGE.per = 20;                  // blocks 1 page
    PAGE.num = urlParams().page||0; // start num page 
    PAGE.header = 'Найдено <b><i>'+SUBJ.length+'</i></b> авторов и <b><i>'+TITLES.length+'</i></b> книг в разных&emsp;'+
  '<a class="nodecor" href="bgenres.html"><i>Жанрах</i></a></h1>';
    PAGE.wrts = SUBJ.slice();
    if(urlParams().page){ // ?page
      document.title += ' - ' + urlParams().page;
      updateMetaTag('description', 'список авторов ' + urlParams().page);
    }
    if(urlParams().find){ // ?find
      PAGE.wrts = PAGE.wrts.filter(function(tit){ 
        return tit[0].search(eval("/"+decodeURI(urlParams().find)+"/i"))>-1;
      });
      PAGE.header = 'Поиск: <i>'+decodeURI(urlParams().find)+'</i> &emsp; <i class="light">('+PAGE.wrts.length+')</i>';
    }
      // ?sort
    if(urlParams().sort == 2)      PAGE.wrts = PAGE.wrts.sort( function(a,b){ return arraySort(a[1],b[1], Number(urlParams().dir), 1); } );
    else if(urlParams().sort == 3) PAGE.wrts = PAGE.wrts.sort( function(a,b){ return arraySort(a[2],b[2], Number(urlParams().dir), 1); } );
    else                           PAGE.wrts = PAGE.wrts.sort( function(a,b){ return arraySort(a[0],b[0], Number(urlParams().dir)); } );
      //
    document.getElementById('pheader').innerHTML = PAGE.header;
    document.getElementById('page_content').innerHTML = '';
    addPageContent(PAGE, 1);
    document.addEventListener('scroll', function() { // infinite scroll
      if(!PAGE.lock && (window.pageYOffset + window.innerHeight) > document.getElementById('root').offsetHeight*0.95){
        addPageContent(PAGE);
      }
    });
  });

</script>
</body>
