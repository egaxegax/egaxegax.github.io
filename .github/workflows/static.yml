name: Deploy static content to Pages

on:
  push:
    branches: ["master"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5

      - name: povarenok.ru feed updater
        continue-on-error: true
        run: python3 posts/readsites.py povarenok
      - name: finecooking.ru site update
        continue-on-error: true
        run: python3 posts/readsites.py finecooking
      - name: prosto-linux feed
        continue-on-error: true
        run: python3 posts/readsites.py prosto_linux
      - name: kino-teatr.ru updater
        continue-on-error: true
        run: python3 posts/readsites.py kino_kino kino_teatr
      # - name:	youtube.com updater
      #   if: github.event.schedule == '0 12 * * *'
      #   run: python3 posts/readyfeed.py
      - name:	rutube.ru updater
        continue-on-error: true
        run: python3 posts/readrufeed.py
      - name: eadaily.com rss updater
        continue-on-error: true
        run: python3 posts/readrss.py eadaily
      - name: habr.com feed
        continue-on-error: true
        run: python3 posts/readsites.py habr
      - name: mk nauka updater
        continue-on-error: true
        run: python3 posts/readrss.py mk
      - name: voyeur feed
        continue-on-error: true
        run: python3 posts/readvhfeed.py
      - name: rambler msk
        continue-on-error: true
        run: python3 posts/readrss.py ramblerm
      - name: rambler mir
        continue-on-error: true
        run: python3 posts/readrss.py rambler
      - name: dzen.ru feed updater
        continue-on-error: true
        run: python3 posts/readzen.py
      - name: championat rss
        continue-on-error: true
        run: python3 posts/readrss.py chmp
      - name: rg rss
        continue-on-error: true
        run: python3 posts/readrss.py rgecon
      - name: yaplakal.com feed
        continue-on-error: true
        run: python3 posts/readsites.py yaplakal

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
