<script>

  document.getElementById('page_footer').innerHTML = 
'<p class="tcenter"><select id="rtblist"></select></p>';

  function clchange(o){
    window.location = '/reklama.html?r=' + (o.options[o.selectedIndex].innerHTML);
  }
 
  function addPageContent(roots, subjects, msgs, page){
    PAGE.lock = 1;
    page.bottom = (page.num)*page.per;
    page.top = page.bottom+page.per;
    page.titles = msgs.slice(page.bottom, page.top);
    page.rtb = (PAGE.osel||page.titles[0]);
    page.rtyp = '';
    switch(page.rtb){
      case 'feed':
      case 'widget': page.rtyp = page.rtb;
      default: break;
    }
    document.getElementById('page_content').innerHTML = '';
    for(var i=0; i<page.titles.length; i++){
      if(window.addYaRTB_Block) {
        document.getElementById('page_content').innerHTML += 
      // '<div id="ya_rtb_'+(i+page.bottom)+'_0" class="mw mh" style="overflow:auto"></div>'+
      '<div id="ya_rtb_'+(i+page.bottom)+'_1" class="mw mh"></div>'+
      '<div id="ya_rtb_'+(i+page.bottom)+'_2" class="mw '+(page.rtyp == '' ? 'mh' : 'mh_1')+'">'+addLoader(page.rtyp!='feed')+'</div>';
        // if(page.rtyp == '') addYaRTB_Block('ya_rtb_'+(i+page.bottom)+'_0', YA_RTB[page.rtb], page.rtyp);
        if(page.rtyp == '') addYaRTB_Block('ya_rtb_'+(i+page.bottom)+'_1', YA_RTB[page.rtb], page.rtyp);
        addYaRTB_Block('ya_rtb_'+(i+page.bottom)+'_2', YA_RTB[page.rtb], page.rtyp);
        if(window.innerWidth>900 && i==0 && !document.getElementById('ya_rtb_rbar_'+i)) {
          document.getElementById('rbar').innerHTML = 
        '<div id="ya_rtb_rbar_'+i+'" class="mw_3 mh_bar vtop"></div>';
          addYaRTB_Block('ya_rtb_rbar_'+i, YA_RTB[page.rtb], page.rtyp);
        }
      }
      console.log('page.rtb', page.rtb, 'page.num', page.num);
    }
    if(page.titles.length){
      document.getElementById('page_footer').innerHTML = addPaginator(msgs, page,
    '<select id="rtblist" onchange="clchange(this)" class="nomarg" title="Блок RTB">'+document.getElementById('rtblist').innerHTML+'</select>');
      document.getElementById('rtblist').value = (page.rtb);
      page.num++;
    } else { 
      page.num = 0;
    }
    setTimeout(function(){ PAGE.lock = (page.titles.length == 0); }, 300);
    return page.titles.length == 0;
  }

  window.PAGE = {};
  PAGE.per = 1;                  // blocks count
  PAGE.num = urlParams().page||0;// start num page 
  PAGE.osel = '';                // start page
    //
  for(var i in window.YA_RTB){
    if (i == 'inimage') continue;
    document.getElementById('rtblist').innerHTML +=
  '<option value="'+i+'">'+i+'</option>';
  }
  window.MSGS = [];
  for(var n=0; n<document.getElementById('rtblist').options.length; n++){
    window.MSGS.push( document.getElementById('rtblist').options[n].value );
  }
    //
  for(var p in urlParams()){
    var pp = p.split('/');
    if(p == 'page' && urlParams().page){ // ?page
      // skip paginate
      document.title += ' - ' + urlParams().page;
    }else if(p == 'ysclid' && urlParams().ysclid){ // ?ysclid
      // skip ya.ru search
    }else if(p == 'r' && urlParams().r){ // ?rtb
      var opts = document.getElementById('rtblist').options;
      for(var ii=0; ii<opts.length; ii++){
        if(opts[ii].innerHTML == urlParams().r) PAGE.osel = opts[ii].value;
      }
    }
  }
  document.getElementById('page_content').innerHTML = '';
  if(!MSGS.length){
    document.getElementById('page_content').innerHTML += addNotFound();
  } else {
    if(addPageContent({}, {}, MSGS, PAGE)) {
      window.location = '/reklama.html?' + urlBuild({page:PAGE.num||null, r:PAGE.osel||null});
    } else {
      window.setTimeout(function(){ 
        window.location = '/reklama.html?' + urlBuild({page:PAGE.num||null, r:PAGE.osel||null});
      }, (Math.random()*30+10)*1000);
    }
  }

</script>
