<div id="footer" class="tcenter">
<p class="gray">Подборка различных фоток, снятых на телефон или взятых из свободных источников</p>
<p><a class="hspaced" title="Исходный код" href="//github.com/egaxegax/egaxegax.github.io">Проект</a><a class="hspaced" title="Поддержать проект" href="//dzen.ru/egax.ru?donate=true">Поддержать<span class="hspaced"></span><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="10 23 46 24"><g fill="currentColor"><circle cx="37.5" cy="27.5" r="10"></circle><path d="M17.5 40v-3 c0-.553-.448-1-1-1h-5c-.552 0-1 .447-1 1v17c0 .553.448 1 1 1h5c.552 0 1-.447 1-1v-14 H26c2.791 0 5.189 1.897 5.833 4.615.053.226.254.385.486.385H41c1.103 0 2 .897 2 2s-.897 2-2 2h-9.529c-.276 0-.5.224-.5.5s.224.5.5.5H41c.45 0 .872-.106 1.256-.285.014-.005.029-.004.043-.01l11.423-5.354c.059-.021 1.479-.471 2.165 1.098C56.198 45.919 55.852 46.892 55.063 47.291l-16.767 9.147c-1.236.898-2.963 1.163-4.495.692L17.5 51.616"></path></g></svg></a>&ensp;&copy;&ensp;</p>

</div>
</div>
<script>

  document.getElementById('page_header').innerHTML = 
'<div class="table">'+
  '<div class="tcell vmid"><h1 id="foto_header">'+'Подборка фоток на разные темы&emsp; <a class="nodecor" href="foto.html"><i>Другие</i></a>'+'</h1></div>'+
  '<div class="tcell tright vmid smaller1" style="width:100px">'+
    '<select id="albumlist" style="max-width:80px"></select>&ensp;'+
  '</div>'+
'</div>';
  document.getElementById('page_content').innerHTML = addLoader(1);

  function addFoto(p){
    if(p.if) {
      updateMetaTag('description', p.title[2]+', '+ p.subj);
      updateMetaTag('keywords', p.title[2]+', '+ p.subj + ', подборки фотографий');
    }
    document.getElementById(p.id).innerHTML = 
  '<div class="msgtext tcenter" style="padding:0"><a target="_blank" href="'+p.url+'">'+
    '<img class="foto" src="'+p.url+'" title="'+p.title[2]+'" alt="">'+
  '</a></div>'+
  '<div id="ya_rtb_'+p.i+'" class="bmarg mw_1 mh_sm"></div>'+
  '<div class="msgfooter tright mw_f nowrap scroll">'+
    '<table width="99%" class="collapse"><tr>'+
      '<td width="100px"><div id="vklike'+(p.i)+'"></div></td>'+
      '<td align="center">'+
        '<a class="nodecor light" href="fotki.html?'+tr(p.subj)+'/'+tr(p.title[2])+'">'+
          ((window.innerWidth<800 && p.title[2].length>32) ? p.title[2].slice(0,28)+'...' : p.title[2])+
        '</a>'+
      '</td>'+
      '<td width="100px" align="right">'+'</td>'+
    '</tr></table>'+
  '</div>';
    // if(window.VK) if(!VK.IsInit) VK.IsInit = VK.init({ apiId: 4748959, onlyWidgets: true });
    // if(window.VK) if(VK.Widgets) VK.Widgets.Like('vklike'+p.i, {type: 'mini', height: 22});
    if(window.addYaRTB_Block) addYaRTB_Block(p.id, YA_RTB['inimage'], 'inImg');
    addTitlesRelsHtml(p, 'fotki.html', '', 'page_content');
    // if(p.ci && window.addYaRTB_Widget) addYaRTB_Widget('ya_rtb_wid', 'widget', ['картинки, фотки', p.root, p.subj]);
  }

  function addPageContent(roots, subjects, fotos, page, iinit){
    PAGE.lock = 1;
    if(fotos.length == 0){
      document.getElementById('page_content').innerHTML += addNotFound();
      return 1;
    }
    if(window.addYaRTB_Block && iinit) {
      document.querySelector('.mh_hd').innerHTML = '<div id="ya_rtb_hd" '+(window.innerWidth<1350 ? 'style="min-height:130px"' : '')+ '></div>';
      addYaRTB_Block('ya_rtb_hd', YA_RTB['foto']);
    }
    page.bottom = (page.num)*page.per;
    page.top = page.bottom+page.per;
    page.titles = fotos.slice(page.bottom, page.top);
    if(page.titles.length){
      document.getElementById('page_footer').innerHTML = addPaginator(fotos, page,
    '<button onclick="this.disabled = addPageContent(ROOTS, SUBJ, FOTOS, PAGE)" class="rounded nopad bigger" title="Загрузить ещё">&#8634;</button>');
    }
    for(var i=0; i<page.titles.length; i++){
      var subj = subjects[page.titles[i][0]],
          root = roots[page.titles[i][4]||0][0],
          title = page.titles[i][1];
      document.getElementById('page_content').innerHTML += 
    '<div id="foto'+(i+page.bottom)+'">'+addLoader(1)+'</div>';
      (function(p){
        var wrap = document.getElementById(p.id);
        wrap.className = 'wrap';
        addFoto(p);
      })({id: 'foto'+(i+page.bottom), i: i+page.bottom, if: i==0, ci: (fotos.length==1), subj: subj[0], title: page.titles[i], 
        url: title});
    }
    page.num++;
    setTimeout(function(){ PAGE.lock = (page.titles.length == 0 || page.num%1 == 0 || urlParams().page); });
    return (page.titles.length == 0);
  }

  xhr({url: 'foto/fotki.js?'+(+new Date())}, function(s){
    eval(s);
    window.PAGE = { 
      per: 1,                  // blocks 1 page
      num: urlParams().page||0 // start num page 
    };
    window.ROOTS = [['.']];
    window.FOTOS = TITLES;
    var album = -1;
    for(var p in urlParams()){
      var pp = p.split('/');
      if(p == 'page' && urlParams().page){ // ?page
        // skip paginate
        document.title += ' - ' + urlParams().page;
      }else if(p && urlParams()[p]){ // ?arg=val
        // skip ya.ru search
      }else if(pp.length>1){ // ?alb/foto
        if((FOTOS = addTitlesRels(pp, SUBJ, FOTOS)).length){
          if(FOTOS.length) document.title = FOTOS[0][2] +', '+ SUBJ[FOTOS[0][0]][0] +' - '+ document.title;
          for(var i in SUBJ){ if (tr(SUBJ[i][0]) == pp[0]) album = i; }
          document.getElementById('foto_header').innerHTML = FOTOS[0][2];
        }
      }else if(pp.length>0){ // ?alb
        FOTOS = FOTOS.filter(function(tit){ return (tr(SUBJ[tit[0]][0]) == pp[0]); });
        if(FOTOS.length) document.title = SUBJ[FOTOS[0][0]][0] + ' - '+ document.title;
        for(var i in SUBJ){ if (tr(SUBJ[i][0]) == pp[0]) album = i; }
        if(FOTOS.length){
          document.getElementById('foto_header').innerHTML = SUBJ[album][0] + ' <i><b>'+FOTOS.length+'</b></i> фото';
        }
      }
    }
    document.getElementById('albumlist').innerHTML =
  '<option value="-1"'+(album == -1 ? ' selected ' : '')+'> Все ['+TITLES.length+']</option>';
    for(var k in SUBJ){
      var falb = TITLES.filter(function(f){ return (f[0] == k); });
      document.getElementById('albumlist').innerHTML +=
    '<option value="'+SUBJ[k][0]+'"'+(k == album ? ' selected ' : '')+'>'+SUBJ[k][0]+' ['+falb.length+']</option>';
    }
    document.getElementById('albumlist').onchange = function(){
      var opt = this.options[this.selectedIndex];
      window.location = 'fotki.html' + (opt.value == '-1' ? '' : '?' + tr(opt.value));
    };
    document.getElementById('page_content').innerHTML = '';
    addPageContent(ROOTS, SUBJ, FOTOS, PAGE, 1);
      // infinite scroll
    document.addEventListener('scroll', function() {
      if(!PAGE.lock && (window.pageYOffset + window.innerHeight) > document.getElementById('root').offsetHeight*0.95){
        addPageContent(ROOTS, SUBJ, FOTOS, PAGE);
      }
    });
  });

</script>
</body>
</html>
