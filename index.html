<p><a class="hspaced" title="Исходный код" href="//github.com/egaxegax/egaxegax.github.io">Проект</a><a class="hspaced" title="Поддержать проект" href="//dzen.ru/egax.ru?donate=true">Поддержать<span class="hspaced"></span><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="10 23 46 24"><g fill="currentColor"><circle cx="37.5" cy="27.5" r="10"></circle><path d="M17.5 40v-3 c0-.553-.448-1-1-1h-5c-.552 0-1 .447-1 1v17c0 .553.448 1 1 1h5c.552 0 1-.447 1-1v-14 H26c2.791 0 5.189 1.897 5.833 4.615.053.226.254.385.486.385H41c1.103 0 2 .897 2 2s-.897 2-2 2h-9.529c-.276 0-.5.224-.5.5s.224.5.5.5H41c.45 0 .872-.106 1.256-.285.014-.005.029-.004.043-.01l11.423-5.354c.059-.021 1.479-.471 2.165 1.098C56.198 45.919 55.852 46.892 55.063 47.291l-16.767 9.147c-1.236.898-2.963 1.163-4.495.692L17.5 51.616"></path></g></svg></a>&ensp;&copy;&ensp;</p>

<script>

  document.getElementById('page_header').innerHTML = 
'<div class="table">'+
  '<div class="tcell vmid"><h1>Подборки статей, постов на разные темы</h1></div>'+
'</div>';
  document.getElementById('page_content').innerHTML = addLoader(1);

  function addAbout(r,p){
    var converter = new showdown.Converter(), // to markdown
        html = converter.makeHtml(r); 
    document.getElementById(p.id).innerHTML = 
  '<div class="posts inlbl">'+ html +'</div>';
    return ' about';
  }

  function addList(p){
    updateMetaTag('keywords', p.subj+', '+p.title[2]+', список постов');
    document.getElementById(p.id).innerHTML += '<div id="'+p.id+'_readme" class="readme"></div>';
    addTitlesRelsHtml(p, 'index.html', '<h2>Список всех страниц</h2>', p.id+'_readme');
  }

  function addPost(r,p,rs){
    var converter = new showdown.Converter(), // to markdown
        html = converter.makeHtml(r) 
          .replace(/src="\.\//g, 'src="posts'+'/'+p.root+'/'+p.subj+'/') // fix img url to absolute
          .replace('<img ', `<img onerror="this.style.display='none'" `) // fix empty img
          .replace('hqdefault.jpg', 'mqdefault.jpg');                    // fix youtube 16:9 img size
    if(p.if){
      updateMetaTag('description', trstr(html.replace(/&nbsp;/g,' ').replace(/(<([^>]+)>)/gi,'').slice(0,512), '.,') + ' ' + (urlParams().page||''));
      updateMetaTag('keywords', buildSubPath(ROOTS, SUBJ, p.title[0]) +', '+ p.title[2] +', читать, смотреть, видео, посты, статьи');
    }
    if(html.search('data-adult') > -1){
      if (!window.ADULT && p.if) window.ADULT = confirm("Взрослый контент. Если вам меньше 18 лет покиньте её. Продолжить?");
      if (!window.ADULT) html = '<p><a class="nodecor hspace gray" href="index.html?'+tr(p.subj)+'/'+tr(p.title[2])+'"><em>Взрослый контент. Подтвердите возраст чтобы открыть страницу.</em></a></p>';
    }
    if(p.view == 'post' && html.search('data-videoid')>-1) {
      html = html.replace(/<a(.*)>\s*<img.*>\s*<\/a>\s*/ig, 
        '<iframe class="embed" align="middle" '+
          'src="'+((html.match(/data-videoid="([^"]+)"/) || []).pop() || '')+'" '+
          'allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" '+
          'allowfullscreen>'+
        '</iframe>'
      ).replace('<div class="inlbl text">', '<div class="inlbl text" style="max-width:100%">');
    }
    document.getElementById(p.id).innerHTML = 
  '<div id="msg'+p.i+'" class="posts inlbl '+ tr(p.root) +'">'+ html +'</div>';
    document.getElementById(p.id).innerHTML += 
  '<div class="msgfooter mw_f nowrap scroll">'+
    '<table class="collapse" width="100%"><tr><td width="50%" align="left">'+
      '<span class="tooltip gray" title="Добавлено '+buildDate(p.title[3])+'" onclick="this.innerHTML=this.title"> '+buildDate(p.title[3],1)+' </span>'+
      '<a class="nodecor hspace gray" href="index.html?'+tr(p.subj)+'/'+tr(p.title[2])+'"> '+addIShare()+' </a>'+
    ((rs=document.querySelector('#'+ p.id +' .rssurl')) ? 
      '<span class="hspace rssfetch tooltip gray" title="'+rs.innerHTML+'" onclick="fetchRSSFromXML(\''+rs.innerHTML+'\',\'msg'+p.i+'\')"> '+addIRefresh()+'</span>' : '')+'</td>'+
      '<td width="75%"><a class="nodecor light" title="'+buildSubPath(ROOTS, SUBJ, p.title[0])+'" href="index.html?'+tr(p.subj)+'">'+SUBJ[p.title[0]][0]+'</a></td>'+
    '</tr></table>'+
  '</div>';
    addTitlesRelsHtml(p, 'index.html', '', 'page_content');
    if(window.addYaRTB_Block) addYaRTB_Block(p.id, YA_RTB['inimage'], 'inImg');
    // if(window.addYaRTB_Widget && p.view == 'post') addYaRTB_Widget('ya_rtb_wid', 'widget', ['заметки', p.root, p.subj]);
  }

  function addPageContent(roots, subjects, page, iinit){
    PAGE.lock = 1;
    if(!page.posts.length){
      document.getElementById('page_content').innerHTML += addNotFound();
      return 1;
    }
    if(window.addYaRTB_Block && iinit) {
      document.querySelector('.mh_hd').innerHTML = '<div id="ya_rtb_hd" '+(window.innerWidth<1350 ? 'style="min-height:130px"' : '')+ '></div>';
      addYaRTB_Block('ya_rtb_hd', YA_RTB['posts']);
    }
    page.bottom = (page.num)*page.per;
    page.top = page.bottom+page.per;
    page.titles = page.posts.slice(page.bottom, page.top);
    if(page.titles.length){
      document.title = page.doctitle;
      document.getElementById('page_footer').innerHTML = addPaginator(page.posts, page,
    '<button onclick="this.disabled = addPageContent(ROOTS, SUBJ, PAGE)" class="rounded nopad hmarg bigger" title="Загрузить ещё">&#8634;</button>');
    }
    for(var i=0; i<page.titles.length; i++){
      var subj = subjects[page.titles[i][0]][0],
          root = roots[page.titles[i][4]][0],
          range = page.titles[i][1];
      document.getElementById('page_content').innerHTML += 
    '<div id="post'+(i+page.bottom)+'">'+addLoader(i==0)+'</div>';
      fetchPart({id: 'post'+(i+page.bottom), view: page.view, i: i+page.bottom, if: i==0, root: root, subj: subj, title: page.titles[i], doctitle: page.doctitle, url: 'posts/'+root+'/'+'README.md', offset: range[0]+7, length: range[1]-8}, function(r,p,st){
        var wrap = document.getElementById(p.id);
        wrap.innerHTML = '';
        if(st == 200 || st == 206) { // skip Not Found pages
          var wrap = document.getElementById(p.id);
          wrap.className = 'wrap';
          (p.title[2] == 'about') ? wrap.className += addAbout(r,p) :
          (p.title[2] == 'README') ? addList(p) : addPost(r,p);
        }
      });
    }
    page.num++;
    setTimeout(function(){ PAGE.lock = (page.titles.length == 0 || page.num%12 == 0 || urlParams().page); });
    return page.titles.length == 0;
  }

  xhr({url: 'posts/index.js?'+(+new Date())}, function(s){
    eval(s);
    window.PAGE = {};
    PAGE.view = 'last';
    PAGE.per = 4;                   // blocks per page
    PAGE.num = urlParams().page||0; // start num page 
    PAGE.header = '<h1>Подборка <b><i>'+TITLES.length+'</i></b> статей на разные&emsp; <a class="nodecor" href="psubj.html"><i>Темы</i></a></h1>';
    PAGE.posts = TITLES.filter(function(tit){ return (tit[2] != 'about'); });
    PAGE.doctitle = 'Статьи, посты на самые разные темы - ' + document.title;
    for(var p in urlParams()){
      var pp = p.split('/');
      if(p == 'page' && urlParams().page){ // ?page
        PAGE.doctitle += ' - '+ urlParams().page; // skip paginate
      }else if(p == 'find' && urlParams().find){ // ?find
        if((PAGE.posts = PAGE.posts.filter(function(tit){ return SUBJ[tit[0]][0].search(eval("/"+decodeURI(urlParams().find)+"/i"))>-1 || tit[2].search(eval("/"+decodeURI(urlParams().find)+"/i"))>-1; })).length){
          PAGE.posts = PAGE.posts.sort(function(a,b){ return arraySort(b[3],a[3]); }); // sort by datetime
          PAGE.header = 'Поиск: <i>'+decodeURI(urlParams().find)+'</i> &emsp; <i class="light">('+PAGE.posts.length+')</i>';
          PAGE.doctitle = PAGE.posts[0][2] + ', ' + SUBJ[PAGE.posts[0][0]][0] + ', поиск - ' + document.title;
          PAGE.per = 10;
        }
      }else if(p && urlParams()[p]){ // ?arg=val
        // skip ya.ru search
      }else if(pp.length>1){ // ?subj/title
        if((PAGE.posts = addTitlesRels(pp, SUBJ, PAGE.posts, (pp[1] != 'readme'), (pp[1] == 'readme'))).length){
          PAGE.header = '<h1>'+buildSubPath(ROOTS, SUBJ, PAGE.posts[0][0]) +'&emsp;<a class="nodecor" href="index.html?'+pp[0]+'/README"><i>Все</i></a></h1>';
          PAGE.doctitle = PAGE.posts[0][2] + ', ' + SUBJ[PAGE.posts[0][0]][0] + ' - ' + document.title;
          PAGE.view = 'post';
        }
      }else if(pp.length>0){ // ?subj
        if((PAGE.posts = PAGE.posts.filter(function(tit){ return (tr(SUBJ[tit[0]][0]) == pp[0]); })).length){
          PAGE.header = '<h1>'+buildSubPath(ROOTS, SUBJ, PAGE.posts[0][0]) + '<i class="hspace light">('+ PAGE.posts.length +')</i><a class="nodecor" href="index.html?'+pp[0]+'/README"><i>Все</i></a></h1>';
          PAGE.about = TITLES.filter(function(tit){ return (tit[0] == PAGE.posts[0][0]) && (tit[4] == PAGE.posts[0][4]) && (tit[2] == 'about'); });
          PAGE.posts = PAGE.posts.sort(function(a,b){ return arraySort(b[3],a[3]); }); // sort by date desc
          PAGE.posts = PAGE.about.concat(PAGE.posts); // +about page
          PAGE.doctitle = SUBJ[PAGE.posts[0][0]][0] + ', ' + ROOTS[SUBJ[PAGE.posts[0][0]][3]][0] + ' - ' + document.title;
          PAGE.view = 'list';
        }
      }
    }
    document.getElementById('page_header').innerHTML = '<div class="table"><div class="tcell vmid">'+PAGE.header+'</div><div class="tcell tright nopad vmid" style="width:100px">'+addFinder("posts")+'</div></div>';
    document.getElementById('page_content').innerHTML = '';
    addPageContent(ROOTS, SUBJ, PAGE, 1);
    document.addEventListener('scroll', function(){ // infinite scroll
      if(!PAGE.lock && (window.pageYOffset + window.innerHeight) > document.getElementById('root').offsetHeight*0.95){
        addPageContent(ROOTS, SUBJ, PAGE);
      }
    });
  });

</script>
</body>
