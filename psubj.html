<script>

  document.getElementById('page_header').innerHTML = 
'<div class="table">'+
  '<div class="tcell vmid"><h1 id="pheader">Выберите одну из тем статей</h1></div>'+
  '<div class="tcell tright nopad vmid" style="width:100px">'+addFinder("posts")+'</div>'+
'</div>';
  document.getElementById('page_content').innerHTML = addLoader(1);

  function addSubjHead(){
    var tmpl = 
  '<table width="100%" class="small" style="padding:0 5px"><tr>'+
    '<td align="right">'+
      '<a class="gray" href="?'+urlBuild({sort:1, dir: (urlParams().dir == 1 ? 'null' : 1)}) +'">'+'Имя'+'</a> &emsp; '+
      '<a class="gray" href="?'+urlBuild({sort:2, dir: (urlParams().dir == 1 ? 'null' : 1)})+'">'+'Кол'+'</a> &emsp; '+
      '<a class="gray" href="?'+urlBuild({sort:3, dir: (urlParams().dir == 1 ? 'null' : 1)})+'">'+'Время'+'</a>'+
    '</td>'+
  '</tr></table>';
    return tmpl; 
  }

  function addSubj(subj,i){
    var subdir = '';
    if (ROOTS[subj[3]][0] != '.'){
      subdir = '<em class="smaller">'+ROOTS[subj[3]][0]+' / </em> ';
    }
    var tmpl = 
  '<table width="100%" class="msgtext"><tr>'+
    '<td width="80%" class="hspaced">'+
      '<a class="nodecor dark" href="index.html?'+tr(subj[0])+'">'+subdir+subj[0]+'</a>'+
    '</td>'+
    '<td width="8%" align="right"><b><i>'+subj[1]+'</i></b></td>'+
    '<td width="8%" align="right"><i class="hspace light small">'+i+'</i></td>'+
    '<td valign=center align="right" class="tooltip gray smaller" title="обновлено '+buildDate(subj[2])+'" onclick="this.innerHTML=addIClock()+this.title"> '+addIClock()+' </td>'+
  '</tr></table>';
    return tmpl;
  }

  function addPageContent(page, iinit){
    if(!page.subj.length){
      document.getElementById('page_content').innerHTML += addNotFound();
      return 1;
    }
    if(window.addYaRTB_Block && iinit) {
      document.querySelector('.mh_hd').innerHTML = '<div id="ya_rtb_hd" '+(window.innerWidth<1350 ? 'style="min-height:130px"' : '')+ '></div>';
      addYaRTB_Block('ya_rtb_hd', YA_RTB['posts']);
    }
    page.bottom = (page.num)*page.per;
    page.top = page.bottom+page.per;
    page.subs = page.subj.slice(page.bottom, page.top);
    if(page.subs.length){
      document.getElementById('page_footer').innerHTML = addPaginator(page.subj, page,
    '<button onclick="this.disabled = addPageContent(PAGE)" class="rounded nopad hmarg bigger" title="Загрузить ещё">&#8634;</button>');
    }
    if(iinit){
      document.getElementById('page_content').innerHTML += addSubjHead();
    }
    for(var i=0; i<page.subs.length; i++){
      document.getElementById('page_content').innerHTML += 
    '<div id="subj'+(i+page.bottom)+'" class="wrap" style="padding:5px 10px">'+addSubj(page.subs[i], page.bottom+i+1)+'</div>';
    }
    page.num++;
    return (page.subs.length == 0);
  }

  xhr({url: 'posts/index.js?'+(+new Date())}, function(s){
    eval(s);
    window.PAGE = {}; 
    PAGE.per = 30;                 // blocks 1 page
    PAGE.num = urlParams().page||0 // start num page 
    PAGE.subj = SUBJ.slice();
    // PAGE.posts = TITLES;
    if(urlParams().page){ // ?page
      document.title += ' - ' + urlParams().page;
      updateMetaTag('description', 'список тем постов ' + urlParams().page);
    }
    if(urlParams().find){ // ?find
      PAGE.subj = PAGE.subj.filter(function(tit){ 
        return tit[0].search(eval("/"+decodeURI(urlParams().find)+"/i"))>-1;
      });
    }
      // ?sort
    if(urlParams().sort == 2)      PAGE.subj = PAGE.subj.sort( function(a,b){ return arraySort(a[1], b[1], Number(urlParams().dir), 1); } );
    else if(urlParams().sort == 3) PAGE.subj = PAGE.subj.sort( function(a,b){ return arraySort(a[2], b[2], Number(urlParams().dir), 1); } );
    else                           PAGE.subj = PAGE.subj.sort( function(a,b){ return arraySort(ROOTS[a[3]][0]+'_'+a[0], ROOTS[b[3]][0]+'_'+b[0], Number(urlParams().dir)); } );
      //
    document.getElementById('pheader').innerHTML = 'Выберите одну из <i><b>'+PAGE.subj.length+'</b></i> тем статей';
    document.getElementById('page_content').innerHTML = '';
    addPageContent(PAGE, 1);
  });

</script>
</body>
